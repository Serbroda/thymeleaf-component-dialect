<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:tc="https://github.com/Serbroda/thymeleaf-component-dialect">
<head>
    <title>Test</title>
</head>
<body>

    <tc:alert tc:constructor="'success', 'First'">
        <span>Content 1</span>
    </tc:alert>

    <tc:alert tc:constructor="'danger', 'Second'">
        <span>Content 2</span>
    </tc:alert>

    <tc:card title="'My Card'">
        <p>Card content</p>
    </tc:card>

</body>
</html>
